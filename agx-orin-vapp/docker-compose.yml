version: '3.8'

networks:
  monitoring:
    driver: bridge

services:
  agx-orin-vapp:
    image: ${CLIENT_AGX_ORIN_VAPP_IMAGE:-aimilefth/6gversus-monitoring:agx-orin-vapp}
    pull_policy: always
    container_name: agx-orin-vapp
    networks:
      - monitoring

    environment:
      # Same Prometheus is used both as input and remote-write output.
      - PROMETHEUS_URL=http://${CLIENT_AGX_ORIN_VAPP_PROMETHEUS_HOST:-host.docker.internal}:${CLIENT_AGX_ORIN_VAPP_PROMETHEUS_PORT:-9090}
      - REMOTE_WRITE_URL=http://${CLIENT_AGX_ORIN_VAPP_PROMETHEUS_HOST:-host.docker.internal}:${CLIENT_AGX_ORIN_VAPP_PROMETHEUS_PORT:-9090}/api/v1/write

      # Base pusher timing.
      - SCRAPE_INTERVAL_S=${CLIENT_AGX_ORIN_VAPP_SCRAPE_INTERVAL_S:-1}
      - PUSH_INTERVAL_S=${CLIENT_AGX_ORIN_VAPP_PUSH_INTERVAL_S:-1}
      - MAX_RETRY_BATCHES=${CLIENT_AGX_ORIN_VAPP_MAX_RETRY_BATCHES:-10}
      - RAW_QUEUE_SIZE=${CLIENT_AGX_ORIN_VAPP_RAW_QUEUE_SIZE:-1000}
      - PROC_QUEUE_SIZE=${CLIENT_AGX_ORIN_VAPP_PROC_QUEUE_SIZE:-1000}
      - LOG_LEVEL=${CLIENT_AGX_ORIN_VAPP_LOG_LEVEL:-INFO}

      # agx-orin-vapp-specific input windowing.
      # FETCH_LOOKBACK_S should usually be SCRAPE_INTERVAL_S + 1 or +2 seconds.
      - FETCH_LOOKBACK_S=${CLIENT_AGX_ORIN_VAPP_FETCH_LOOKBACK_S:-3}
      # EMIT_DELAY_S prevents emitting the newest not-yet-complete timestamp.
      - EMIT_DELAY_S=${CLIENT_AGX_ORIN_VAPP_EMIT_DELAY_S:-1}
      - REQUEST_TIMEOUT_S=${CLIENT_AGX_ORIN_VAPP_REQUEST_TIMEOUT_S:-5}

      # Input selector. This intentionally reads agx-orin-jtop, not agx-orin-vapp.
      - INPUT_SOURCE_REGEX=${CLIENT_AGX_ORIN_VAPP_INPUT_SOURCE_REGEX:-agx-orin-jtop-01}
      - INPUT_SOURCE_LABEL=${CLIENT_AGX_ORIN_VAPP_INPUT_SOURCE_LABEL:-agx-orin-jtop-01}
      - INPUT_METRIC_REGEX=${CLIENT_AGX_ORIN_VAPP_INPUT_METRIC_REGEX:-agx_orin_.*}

      # Output metric/labels.
      - SERVICE_LABEL=${CLIENT_AGX_ORIN_VAPP_SERVICE_LABEL:-agx-orin-vapp-01}
      - MODEL_LABEL=${CLIENT_AGX_ORIN_VAPP_MODEL_LABEL:-default}
      - METRIC_CALIBRATED_POWER=${CLIENT_AGX_ORIN_VAPP_METRIC_CALIBRATED_POWER:-agx_orin_vapp_calibrated_power_watts}
      - OUTPUT_COMPONENT=${CLIENT_AGX_ORIN_VAPP_OUTPUT_COMPONENT:-calibrated_power}
      - STATE_FILE=${CLIENT_AGX_ORIN_VAPP_STATE_FILE:-/data/agx-orin-vapp-state.json}

    healthcheck:
      test:
        - CMD-SHELL
        - >
          python -c "import urllib.request,sys;
          urllib.request.urlopen('http://${CLIENT_AGX_ORIN_VAPP_PROMETHEUS_HOST:-host.docker.internal}:${CLIENT_AGX_ORIN_VAPP_PROMETHEUS_PORT:-9090}/-/healthy', timeout=3);
          sys.exit(0)"
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

    restart: unless-stopped